<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/scale-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inheritance Calculator</title>
    <!-- SEO description (Google snippet) -->
    <meta
      name="description"
      content="Calculate inheritance distribution for a deceased's estate according to Islamic law"
    />

    <!-- Mobile: PWA-style name on home screen -->
    <meta name="application-name" content="Inheritance Calculator" />
    <meta name="apple-mobile-web-app-title" content="Inheritance Calculator" />

    <!-- Theme color (browser chrome on mobile) -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph (WhatsApp, Slack, social previews) -->
    <meta property="og:title" content="Inheritance Calculator" />
    <meta
      property="og:description"
      content="Calculate inheritance distribution for a deceased's estate according to Islamic law"
    />
    <meta
      property="og:image"
      content="https://ali-khanchi.github.io/inheritance-calculator/scale-icon.png"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // This script checks if the URL has a redirected path parameter (?p=...)
      // If it does, it uses browser history to cleanly rewrite the URL back to /examples
      // right before React Router initializes.
      (function (l) {
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var decoded = l.search
            .slice(3)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, l.pathname.lastIndexOf('/')) +
              '/' +
              decoded +
              l.hash
          );
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
